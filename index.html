<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Playlist with Commentary</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Grid Background */
        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(rgba(30, 60, 114, 0.2) 1px, transparent 1px),
                linear-gradient(90deg, rgba(30, 60, 114, 0.2) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridMove 20s linear infinite;
            z-index: -1;
        }

        @keyframes gridMove {
            0% {
                transform: translate(0, 0);
            }
            100% {
                transform: translate(40px, 40px);
            }
        }

        .grid-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                       radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.15) 0%, transparent 50%),
                       radial-gradient(circle at 40% 80%, rgba(120, 219, 255, 0.2) 0%, transparent 50%);
            animation: pulse 15s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            0% {
                opacity: 0.5;
            }
            100% {
                opacity: 0.8;
            }
        }

        .container {
            width: 90%;
            max-width: 1200px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Main Content */
        .content {
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex: 1;
            overflow: hidden;
        }

        @media (min-width: 768px) {
            .content {
                flex-direction: row;
            }
        }

        /* Video Section */
        .video-section {
            flex: 2;
            display: flex;
            flex-direction: column;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            background: rgba(20, 25, 45, 0.7);
            backdrop-filter: blur(10px);
        }

        .video-container {
            width: 100%;
            height: 0;
            padding-bottom: 56.25%; /* 16:9 aspect ratio */
            position: relative;
        }

        .youtube-embed {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .video-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            background: rgba(15, 20, 40, 0.8);
        }

        .control-button {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(40, 60, 120, 0.8);
            border: 2px solid rgba(100, 150, 255, 0.5);
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .control-button:hover {
            background: rgba(60, 90, 180, 0.9);
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }

        .control-button:active {
            transform: scale(0.95);
        }

        .play-button {
            background: rgba(220, 60, 80, 0.9);
            border-color: rgba(255, 100, 120, 0.7);
        }

        .playlist-indicator {
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 15px;
            background: rgba(15, 20, 40, 0.6);
        }

        .playlist-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: rgba(100, 130, 200, 0.5);
            cursor: pointer;
            transition: all 0.3s;
        }

        .playlist-dot.active {
            background: #ffcc00;
            transform: scale(1.2);
            box-shadow: 0 0 10px rgba(255, 204, 0, 0.7);
        }

        /* Commentary Section */
        .commentary-section {
            flex: 1;
            background: rgba(30, 35, 60, 0.8);
            border-radius: 15px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(100, 150, 255, 0.2);
        }

        .commentary-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #ffcc00;
            text-align: center;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 204, 0, 0.3);
        }

        .commentary-content {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .commentary-slides {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: transform 0.5s ease-in-out;
        }

        .commentary-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            padding-right: 10px;
        }

        .artist-section {
            margin-bottom: 25px;
        }

        .artist-name {
            font-size: 1.3rem;
            color: #6ab7ff;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid rgba(106, 183, 255, 0.3);
        }

        .artist-context {
            font-size: 0.9rem;
            color: #aac8e5;
            margin-bottom: 15px;
            line-height: 1.5;
            font-style: italic;
        }

        .track-info {
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(20, 25, 45, 0.5);
            border-radius: 8px;
            border-left: 3px solid rgba(106, 183, 255, 0.5);
        }

        .track-title {
            font-size: 1.2rem;
            color: #a3d5ff;
            margin-bottom: 5px;
        }

        .track-artist {
            font-size: 1rem;
            color: #b3e5fc;
            margin-bottom: 10px;
        }

        .commentary-text {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #e0e0e0;
        }

        .commentary-text p {
            margin-bottom: 10px;
        }

 

        /* Responsive adjustments */
        @media (max-width: 767px) {
            .control-button {
                width: 50px;
                height: 50px;
                font-size: 1.2rem;
            }
            
            .container {
                height: auto;
                max-height: none;
            }
        }
    </style>
</head>
<body>

                <div class="video-controls">

            <!-- Commentary Section -->
            <div class="commentary-section">

        </div>
        
      

    <script>

                commentary: "The extremely controversial song that catapulted her career upward - Becky was Shannon's (not at all famous) new girlfriend (at the time) that Fletcher name drops. This video also gives a glimpse of Fletcher's live performances and intense fandom. I do not condone the song, it's exploitative (nor do I really like the song), but including for context. After this, there was 1-2 more albums about the same ex (ugh) and a whole saga involving Fletcher ending in featured on her ex's podcast to come full circle. Becky was the real hero here. As additional context, interestingly, Fletcher's interview / regular personality is very grounded and human forward while her artist persona historically has been lesbian chaos — something that seemed dissonant. All that drama apparently did not make Fletcher feel too good and her latest album (not included here) is purely self-reflective / slower, and she announced she would not be touring it right away / didn't know when she would or what she'd do next."
            },
            {
                title: "girls girls girls",
                artist: "FLETCHER",
                youtubeId: "rzV9fgb-bsI",

                artistContext: "Ah yes, Fletcher.",
                commentary: "A reinterpretation / spin off / sample of Katy Perry's I kissed a girl but fr gay"
            },
            {
                title: "Ode to Sleep",
                artist: "Twenty One Pilots",
                youtubeId: "2OnO3UXFZdE",

                artistContext: "A 2-person band made up of Tyler Joseph (singer + much more) and Josh Dun (drummer)",
                commentary: "I chose this video bc it shows the sound of their roots and progression from a small band playing to rooms of 12 people to thousands."
            },
            {

            },
            {

                artistContext: "A 2-person band made up of Tyler Joseph (singer + much more) and Josh Dun (drummer)",
                commentary: "Oldies Station is one of my favorite tøp songs and I think this acoustic rendition is beautiful. You'll see Tyler prefaces the song by saying a main purpose of it it was to give the fans an update on how he was — as I mentioned before a lot of the fanbase is very connected to the theme of mental health that runs through the band's music & they are well-versed in what Tyler has shared of his own experiences in the songs etc. Thus why his fans would be invested in that so much as to produce a song."
            },
            {
                title: "Downstairs",
                artist: "Twenty One Pilots",
                youtubeId: "zcZMQZbPMxM",
                artistName: "Twenty One Pilots",
                artistContext: "A 2-person band made up of Tyler Joseph (singer + much more) and Josh Dun (drummer)",
                commentary: "This is a really special song off the new album – when I attended Seasick's album release listening party, Tyler prefaced that this song was actually 14 years old and Josh (the drummer) had kept a demo of it on his computer after all those years and brought it up as an idea for this album. Stylistically, it sounds similar to their early stuff. Very special context for this (very recent!!) video — this is the first (and only so far) time they played it live. It is not on their tour setlist. This video was filmed at a private no-phones show hosted by a radio station while they were in LA last week to play some stadiums. You can tell how shocked and excited the fans were when they realized what song was starting. I think the video also really encapsulates the connection between the band and their fans, and the band's dynamic audience engagement."

            {

            {

                youtubeId: "8NEmNGkj7_Y",
                artistName: "Kacey Musgraves",
                artistContext: "",
                commentary: "\"grandma cried when I pierced my nose\" one of my fav song lyrics ever 🤣makes me giggle every time"
            },
            {
                title: "Oh, What A World",
                artist: "Kacey Musgraves",
                youtubeId: "1hwRe7scRiY",
                artistName: "Kacey Musgraves",
                artistContext: "",
                commentary: "Gorgeous song about how beautiful the world is (and whatever man she's also singing about (?))."
            },
            {
                title: "The Architect",
                artist: "Kacey Musgraves",
                youtubeId: "Tog63hCb7xs",
                artistName: "Kacey Musgraves",
                artistContext: "",
                commentary: "Ms. Musgraves likes to meditate on life and I must say I quite enjoy that."

        document.addEventListener('DOMContentLoaded', function() {
            const prevButton = document.querySelector('.prev-button');
            const nextButton = document.querySelector('.next-button');
            const playButton = document.querySelector('.play-button');
            const playlistIndicator = document.getElementById('playlist-indicator');
            const commentarySlides = document.getElementById('commentary-slides');
            const youtubePlayer = document.getElementById('youtube-player');
            
            let currentTrack = 0;
            let isPlaying = false;
            
            // Create playlist dots
            playlist.forEach((track, index) => {
                const dot = document.createElement('div');
                dot.className = 'playlist-dot';
                if (index === 0) dot.classList.add('active');
                dot.setAttribute('data-index', index);
                playlistIndicator.appendChild(dot);
            });
            
            const dots = document.querySelectorAll('.playlist-dot');
            
            // Create commentary slides
            playlist.forEach((track, index) => {
                const slide = document.createElement('div');
                slide.className = 'commentary-slide';
                slide.style.transform = `translateX(${index * 100}%)`;
                
                // Create artist section for this track
                const artistSection = document.createElement('div');
                artistSection.className = 'artist-section';
                
                const artistName = document.createElement('h3');
                artistName.className = 'artist-name';
                artistName.textContent = track.artistName;
                artistSection.appendChild(artistName);
                
                if (track.artistContext) {
                    const artistContext = document.createElement('p');
                    artistContext.className = 'artist-context';
                    artistContext.textContent = track.artistContext;
                    artistSection.appendChild(artistContext);
                }
                
                // Create track info
                const trackInfo = document.createElement('div');
                trackInfo.className = 'track-info';
                
                const trackTitle = document.createElement('h4');
                trackTitle.className = 'track-title';
                trackTitle.textContent = track.title;
                trackInfo.appendChild(trackTitle);
                
                const trackArtist = document.createElement('p');
                trackArtist.className = 'track-artist';
                trackArtist.textContent = track.artist;
                trackInfo.appendChild(trackArtist);
                
                const commentaryText = document.createElement('div');
                commentaryText.className = 'commentary-text';
                
                // Split commentary by paragraphs if needed
                const paragraphs = track.commentary.split('\n');
                paragraphs.forEach(paragraph => {
                    if (paragraph.trim()) {
                        const p = document.createElement('p');
                        p.textContent = paragraph.trim();
                        commentaryText.appendChild(p);
                    }
                });
                
                trackInfo.appendChild(commentaryText);
                artistSection.appendChild(trackInfo);
                slide.appendChild(artistSection);
                commentarySlides.appendChild(slide);
            });
            
            // Navigation functions
            function goToTrack(index) {
                // Update active dot
                dots.forEach(dot => dot.classList.remove('active'));
                dots[index].classList.add('active');
                
                // Update YouTube video
                currentTrack = index;
                youtubePlayer.src = `https://www.youtube.com/embed/${playlist[index].youtubeId}?enablejsapi=1&autoplay=0`;
                
                // Update commentary slide position
                commentarySlides.style.transform = `translateX(-${index * 100}%)`;
                
                // Reset play button
                playButton.innerHTML = '<i class="fas fa-play"></i>';
                isPlaying = false;
            }
            
            // Event listeners
            prevButton.addEventListener('click', function() {
                let newIndex = currentTrack - 1;
                if (newIndex < 0) newIndex = playlist.length - 1;
                goToTrack(newIndex);
            });
            
            nextButton.addEventListener('click', function() {
                let newIndex = currentTrack + 1;
                if (newIndex >= playlist.length) newIndex = 0;
                goToTrack(newIndex);
            });
            
            playButton.addEventListener('click', function() {
                // Toggle play/pause
                if (!isPlaying) {
                    playButton.innerHTML = '<i class="fas fa-pause"></i>';
                    isPlaying = true;
                    // For now, we'll just reload the video with autoplay
                    youtubePlayer.src = `https://www.youtube.com/embed/${playlist[currentTrack].youtubeId}?enablejsapi=1&autoplay=1`;
                } else {
                    playButton.innerHTML = '<i class="fas fa-play"></i>';
                    isPlaying = false;
                    // For now, we'll just reload the video without autoplay
                    youtubePlayer.src = `https://www.youtube.com/embed/${playlist[currentTrack].youtubeId}?enablejsapi=1&autoplay=0`;
                }
            });
            
            // Dot navigation
            dots.forEach((dot) => {
                dot.addEventListener('click', function() {
                    const index = parseInt(this.getAttribute('data-index'));
                    goToTrack(index);
                });
            });
            
            // Initialize with first track
            goToTrack(0);
        });
    </script>
</body>
</html>
