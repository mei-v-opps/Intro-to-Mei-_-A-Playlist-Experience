<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Playlist with Commentary</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Grid Background */
        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(rgba(30, 60, 114, 0.2) 1px, transparent 1px),
                linear-gradient(90deg, rgba(30, 60, 114, 0.2) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridMove 20s linear infinite;
            z-index: -1;
        }

        @keyframes gridMove {
            0% {
                transform: translate(0, 0);
            }
            100% {
                transform: translate(40px, 40px);
            }
        }

        .grid-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                       radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.15) 0%, transparent 50%),
                       radial-gradient(circle at 40% 80%, rgba(120, 219, 255, 0.2) 0%, transparent 50%);
            animation: pulse 15s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            0% {
                opacity: 0.5;
            }
            100% {
                opacity: 0.8;
            }
        }

        .container {
            width: 90%;
            max-width: 1200px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Main Content */
        .content {
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex: 1;
            overflow: hidden;
        }

        @media (min-width: 768px) {
            .content {
                flex-direction: row;
            }
        }

        /* Video Section */
        .video-section {
            flex: 2;
            display: flex;
            flex-direction: column;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            background: rgba(20, 25, 45, 0.7);
            backdrop-filter: blur(10px);
        }

        .video-container {
            width: 100%;
            height: 0;
            padding-bottom: 56.25%; /* 16:9 aspect ratio */
            position: relative;
        }

        .youtube-embed {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .video-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            background: rgba(15, 20, 40, 0.8);
        }

        .control-button {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(40, 60, 120, 0.8);
            border: 2px solid rgba(100, 150, 255, 0.5);
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .control-button:hover {
            background: rgba(60, 90, 180, 0.9);
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }

        .control-button:active {
            transform: scale(0.95);
        }

        .play-button {
            background: rgba(220, 60, 80, 0.9);
            border-color: rgba(255, 100, 120, 0.7);
        }

        .playlist-indicator {
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 15px;
            background: rgba(15, 20, 40, 0.6);
        }

        .playlist-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: rgba(100, 130, 200, 0.5);
            cursor: pointer;
            transition: all 0.3s;
        }

        .playlist-dot.active {
            background: #ffcc00;
            transform: scale(1.2);
            box-shadow: 0 0 10px rgba(255, 204, 0, 0.7);
        }

        /* Commentary Section */
        .commentary-section {
            flex: 1;
            background: rgba(30, 35, 60, 0.8);
            border-radius: 15px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(100, 150, 255, 0.2);
        }

        .commentary-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #ffcc00;
            text-align: center;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 204, 0, 0.3);
        }

        .commentary-content {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .commentary-slides {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: transform 0.5s ease-in-out;
        }

        .commentary-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            padding-right: 10px;
        }

        .artist-section {
            margin-bottom: 25px;
        }

        .artist-name {
            font-size: 1.3rem;
            color: #6ab7ff;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid rgba(106, 183, 255, 0.3);
        }

        .artist-context {
            font-size: 0.9rem;
            color: #aac8e5;
            margin-bottom: 15px;
            line-height: 1.5;
            font-style: italic;
        }

        .track-info {
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(20, 25, 45, 0.5);
            border-radius: 8px;
            border-left: 3px solid rgba(106, 183, 255, 0.5);
        }

        .track-title {
            font-size: 1.2rem;
            color: #a3d5ff;
            margin-bottom: 5px;
        }

        .track-artist {
            font-size: 1rem;
            color: #b3e5fc;
            margin-bottom: 10px;
        }

        .commentary-text {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #e0e0e0;
        }

        .commentary-text p {
            margin-bottom: 10px;
        }

 

        /* Responsive adjustments */
        @media (max-width: 767px) {
            .control-button {
                width: 50px;
                height: 50px;
                font-size: 1.2rem;
            }
            
            .container {
                height: auto;
                max-height: none;
            }
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    
    <div class="container">
        <div class="content">
            <!-- Video Section -->
            <div class="video-section">
                <div class="video-container">
                    <iframe class="youtube-embed" id="youtube-player" src="https://www.youtube.com/embed/iX8pYFlzP9U?enablejsapi=1" frameborder="0" referrerpolicy="strict-origin-when-cross-origin" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>
                
                <div class="video-controls">
                    <button class="control-button prev-button">
                        <i class="fas fa-backward-step"></i>
                    </button>
                    <button class="control-button play-button">
                        <i class="fas fa-play"></i>
                    </button>
                    <button class="control-button next-button">
                        <i class="fas fa-forward-step"></i>
                    </button>
                </div>
                
                <div class="playlist-indicator" id="playlist-indicator">
                    <!-- Dots will be generated by JavaScript -->
                </div>
            </div>
            
            <!-- Commentary Section -->
            <div class="commentary-section">
                <h2 class="commentary-title">TRACK COMMENTARY</h2>
                
                <div class="commentary-content">
                    <div class="commentary-slides" id="commentary-slides">
                        <!-- Commentary slides will be generated by JavaScript -->
                    </div>
                </div>
            </div>
        </div>
        
      

    <script>
        // Playlist data
        const playlist = [
            {

                artistName: "Julia Wolf",

                commentary: "This being the song that popularized Julia Wolf, is also the song that introduced me to her music. Everything from her Twilight-esque aesthetics to her grundgey alt-rock sound screams cool older sister. Fun fact though, shes such a fan of the Twilight franchise that this music video is shot in Forks, Washington at locations where the Twilight movie was filmed."

                commentary: "In choosing peace she wishes all those she used to love roses. After listening to Hasta Cuando this song is definitely needed before my head grows too big."

            {

            {

                artistName: "Soulja Boy",
                artistContext: "Pioneering internet marketing, he released his own music & videos all over MySpace and Youtube. With Crank That blowing up and throwing him to stardom that's how we got to supaman.",
                commentary: "Being equally situational as Yahhh!, this song is on when I flop on a test. Soulja Boy helps me cope, what can I say."
            },
            {
                title: "Headliner",
                artist: "Pretty Sick",
                youtubeId: "unUspj0lDn8",
                artistName: "Pretty Sick",
                artistContext: "With their grundgey dreamy sound their music sounds like a dream (or nightmare) you can't quite remember. By mixing grundge & electronic music they've been building a cult following since 2014.",
                commentary: "This song explores the oncoming confusion of attraction, identity, and self worth that comes with youth. The visuals of being an angel stuck on the grundgiest city on Earth (NYC) is a great omage to the ethereal yet liminal sound of the track"
            },
            {
                title: "Silk Lingerie",
                artist: "Kali Uchis",
                youtubeId: "wbjpbrfA2HI",
                artistName: "Kali Uchis",
                artistContext: "KALI UCHIS. SHE IS MOTHER; SHE IS LIFE. Mami Uchis blew up in 2020 with telepatia, but was already relevant with significant tracks and features like on See You Again with Tyler, the Creator. We have Mami Uchis to thank for playing a big part in popularizing latin & spanish music)",
                commentary: "Seeing this and the previous Kali Uchis songs on this playlist live healed something in me. Silk Lingerie really is just the feeling of being so intensely in love with someone to where you don't understand how someone can be so perfect. This song also depicts perfectly her ethereal vocals; Mami Uchis is a real life siren. If you listen to the full album you'll also find that the transition into the next song Territorial is insanely smooth."
            },
            {

                artist: "The Internet",
                youtubeId: "CNJkas_LiCM",
                artistName: "The Internet",
                artistContext: "A neo-soul band with vocals from Syd this band is (sadly) on hiatus with each member focusing on their solo careers. Notably Steve Lacy (guitar), Matt Martians (keyboard), and their vocalist Syd.",
                commentary: "Coming from their Grammy-nominated album EGO DEATH you can tell why it's popular. While narrating about a one night stand (special affair). With a dark and seductive sound you just can't fully recreate."
            },
            {
                title: "Girl",
                artist: "The Internet",
                youtubeId: "zmY8mG4_3j4",
                artistName: "The Internet",
                artistContext: "A neo-soul band with vocals from Syd this band is (sadly) on hiatus with each member focusing on their solo careers. Notably Steve Lacy (guitar), Matt Martians (keyboard), and their vocalist Syd.",
                commentary: "This song is so real (and gay). Personally this was one of my first exposures to openly queer music, that wasn't I Kissed a Girl from Katy Perry. The visuals and sound of this song is as well though. With its silky smooth vocals & instrumentals you can't listen to it and still be stressed."
            },
            {
                title: "damned",
                artist: "Miguel",
                youtubeId: "yXd4YeSLRQM",
                artistName: "Miguel",
                artistContext: "I've only recently really gotten into his music, but was entranced when I first heard his music. Blending hip-hop, R&B, and rock, his music is identifiable. ",
                commentary: "You can probably tell at this point I'm a sucker for love songs with a dark alternative R&B sound. In this he's in such an all consuming love to the point where it feels like he's damned. At the time of producation and release he was dating his longtime girlfriend of almost ten years, so you can see where the inspiration came from."
            },
            {
                title: "Sycamore Tree",
                artist: "Kali Uchis",
                youtubeId: "q7oGK90Y0pQ",
                artistName: "Kali Uchis",
                artistContext: "KALI UCHIS. SHE IS MOTHER; SHE IS LIFE. Mami Uchis blew up in 2020 with telepatia, but was already relevant with significant tracks and features like on See You Again with Tyler, the Creator. We have Mami Uchis to thank for playing a big part in popularizing latin & spanish music",
                commentary: "This song is not as popular "
            },
            {
                title: "No Comma",
                artist: "Slayyyter",
                youtubeId: "9UpdEW_NNEE",
                artistName: "Slayyyter",
                artistContext: "She's the moment; she's an icon",
                commentary: "Actaully the first time I listened to Slayyter was when I was in my friends car getting taco bell, all while going ten below the speed limit. He's a responsible driver because I can't play Slayyyter while driving or I'm bound to speed unreasonably. This song is energy in a track and has brought me through countless all nighters for exams."
            },
            {
                title: "STOLE YA FLOW",
                artist: "A$AP Rocky",
                youtubeId: "F6VfsJ7LAlE",
                artistName: "A$AP Rocky",
                artistContext: "I always say I'm Rocky in another life cause married to Rihanna, beautiful family, fire music, who could ask for more? With his experimentalism in everything he touches from music to fashion. His sound is unique in the use of electronic, rock, and grundge as inspiration.",
                commentary: "I wish to be a fashion killa one day, so this song speaks to me. I also love how much you can tell Riri is his muse and love of his life."
            },
            {
                title: "VYZEE",
                artist: "SOPHIE",
                youtubeId: "KXdRl6Ml37I",
                artistName: "SOPHIE",
                artistContext: "Sophie Xeon is the queen of electronic pop and so much more. Even if you don't know who she is you HAVE to know her influence. Her experimental sound was ground breaking for even beyond her genre. RIP, love you girl.",
                commentary: "This song recently went viral and through it I rediscovered my love and respect for SOPHIE and her discography. People often forget just how experimental and original her music was because she is the influence for so many artists today, and this song only further proves that."
            },
            {
                title: "BEAT UP CHANEL$",
                artist: "slayyyter",
                youtubeId: "hhvW8qB-W3M",
                artistName: "slayyyter",
                artistContext: "She's the moment; she's an icon",
                commentary: "This song is weirdly motivational for me; she wants what she wants. BEAT UP CHANEL$ is also my favorite from Slayyyter's discography IMO. Hearing the bridge changed me. I don't know who I was before I heard this song but I'm not her anymore."
            },
            {
                title: "WASSUP",
                artist: "Young Miko",
                youtubeId: "LEhTlLnOVDU",
                artistName: "Young Miko",
                artistContext: "Puerto Rican rapper, singer, and song writer. I discovered her around 2024 and she's been a consistent artist in my library since. Her unique mix of house, reggaeton, and trap is something I haven't seen in other artists.",
                commentary: "Young Miko & this song were recently featured in a GAP ad and I don't usually like collabs with coorperations but this song does things. Can you tell I take spanish in school?"
            },
            {
                title: "BIAF",
                artist: "Young Miko",
                youtubeId: "BboJ9CzPhnM",
                artistName: "Young Miko",
                artistContext: "Puerto Rican rapper, singer, and song writer. I discovered her around 2024 and she's been a consistent artist in my library since. Her unique mix of house, reggaeton, and trap is something I haven't seen in other artists",
                commentary: "Single from her newest album Do NOt Disturb: Late Checkout. While the song is amazing, the music video is really what had it make this list. I love the aesthetics and just how playful the video is."
            }
        ];

        document.addEventListener('DOMContentLoaded', function() {
            const prevButton = document.querySelector('.prev-button');
            const nextButton = document.querySelector('.next-button');
            const playButton = document.querySelector('.play-button');
            const playlistIndicator = document.getElementById('playlist-indicator');
            const commentarySlides = document.getElementById('commentary-slides');
            const youtubePlayer = document.getElementById('youtube-player');
            
            let currentTrack = 0;
            let isPlaying = false;
            
            // Create playlist dots
            playlist.forEach((track, index) => {
                const dot = document.createElement('div');
                dot.className = 'playlist-dot';
                if (index === 0) dot.classList.add('active');
                dot.setAttribute('data-index', index);
                playlistIndicator.appendChild(dot);
            });
            
            const dots = document.querySelectorAll('.playlist-dot');
            
            // Create commentary slides
            playlist.forEach((track, index) => {
                const slide = document.createElement('div');
                slide.className = 'commentary-slide';
                slide.style.transform = `translateX(${index * 100}%)`;
                
                // Create artist section for this track
                const artistSection = document.createElement('div');
                artistSection.className = 'artist-section';
                
                const artistName = document.createElement('h3');
                artistName.className = 'artist-name';
                artistName.textContent = track.artistName;
                artistSection.appendChild(artistName);
                
                if (track.artistContext) {
                    const artistContext = document.createElement('p');
                    artistContext.className = 'artist-context';
                    artistContext.textContent = track.artistContext;
                    artistSection.appendChild(artistContext);
                }
                
                // Create track info
                const trackInfo = document.createElement('div');
                trackInfo.className = 'track-info';
                
                const trackTitle = document.createElement('h4');
                trackTitle.className = 'track-title';
                trackTitle.textContent = track.title;
                trackInfo.appendChild(trackTitle);
                
                const trackArtist = document.createElement('p');
                trackArtist.className = 'track-artist';
                trackArtist.textContent = track.artist;
                trackInfo.appendChild(trackArtist);
                
                const commentaryText = document.createElement('div');
                commentaryText.className = 'commentary-text';
                
                // Split commentary by paragraphs if needed
                const paragraphs = track.commentary.split('\n');
                paragraphs.forEach(paragraph => {
                    if (paragraph.trim()) {
                        const p = document.createElement('p');
                        p.textContent = paragraph.trim();
                        commentaryText.appendChild(p);
                    }
                });
                
                trackInfo.appendChild(commentaryText);
                artistSection.appendChild(trackInfo);
                slide.appendChild(artistSection);
                commentarySlides.appendChild(slide);
            });
            
            // Navigation functions
            function goToTrack(index) {
                // Update active dot
                dots.forEach(dot => dot.classList.remove('active'));
                dots[index].classList.add('active');
                
                // Update YouTube video
                currentTrack = index;
                youtubePlayer.src = `https://www.youtube.com/embed/${playlist[index].youtubeId}?enablejsapi=1&autoplay=0`;
                
                // Update commentary slide position
                commentarySlides.style.transform = `translateX(-${index * 100}%)`;
                
                // Reset play button
                playButton.innerHTML = '<i class="fas fa-play"></i>';
                isPlaying = false;
            }
            
            // Event listeners
            prevButton.addEventListener('click', function() {
                let newIndex = currentTrack - 1;
                if (newIndex < 0) newIndex = playlist.length - 1;
                goToTrack(newIndex);
            });
            
            nextButton.addEventListener('click', function() {
                let newIndex = currentTrack + 1;
                if (newIndex >= playlist.length) newIndex = 0;
                goToTrack(newIndex);
            });
            
            playButton.addEventListener('click', function() {
                // Toggle play/pause
                if (!isPlaying) {
                    playButton.innerHTML = '<i class="fas fa-pause"></i>';
                    isPlaying = true;
                    // For now, we'll just reload the video with autoplay
                    youtubePlayer.src = `https://www.youtube.com/embed/${playlist[currentTrack].youtubeId}?enablejsapi=1&autoplay=1`;
                } else {
                    playButton.innerHTML = '<i class="fas fa-play"></i>';
                    isPlaying = false;
                    // For now, we'll just reload the video without autoplay
                    youtubePlayer.src = `https://www.youtube.com/embed/${playlist[currentTrack].youtubeId}?enablejsapi=1&autoplay=0`;
                }
            });
            
            // Dot navigation
            dots.forEach((dot) => {
                dot.addEventListener('click', function() {
                    const index = parseInt(this.getAttribute('data-index'));
                    goToTrack(index);
                });
            });
            
            // Initialize with first track
            goToTrack(0);
        });
    </script>
</body>
</html>
