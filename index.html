<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Playlist with Commentary</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Grid Background */
        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(rgba(30, 60, 114, 0.2) 1px, transparent 1px),
                linear-gradient(90deg, rgba(30, 60, 114, 0.2) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridMove 20s linear infinite;
            z-index: -1;
        }

        @keyframes gridMove {
            0% {
                transform: translate(0, 0);
            }
            100% {
                transform: translate(40px, 40px);
            }
        }

        .grid-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                       radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.15) 0%, transparent 50%),
                       radial-gradient(circle at 40% 80%, rgba(120, 219, 255, 0.2) 0%, transparent 50%);
            animation: pulse 15s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            0% {
                opacity: 0.5;
            }
            100% {
                opacity: 0.8;
            }
        }

        .container {
            width: 90%;
            max-width: 1200px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Main Content */
        .content {
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex: 1;
            overflow: hidden;
        }

        @media (min-width: 768px) {
            .content {
                flex-direction: row;
            }
        }

        /* Video Section */
        .video-section {
            flex: 2;
            display: flex;
            flex-direction: column;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            background: rgba(20, 25, 45, 0.7);
            backdrop-filter: blur(10px);
        }

        .video-container {
            width: 100%;
            height: 0;
            padding-bottom: 56.25%; /* 16:9 aspect ratio */
            position: relative;
        }

        .youtube-embed {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .video-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            background: rgba(15, 20, 40, 0.8);
        }

        .control-button {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(40, 60, 120, 0.8);
            border: 2px solid rgba(100, 150, 255, 0.5);
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .control-button:hover {
            background: rgba(60, 90, 180, 0.9);
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }

        .control-button:active {
            transform: scale(0.95);
        }

        .play-button {
            background: rgba(220, 60, 80, 0.9);
            border-color: rgba(255, 100, 120, 0.7);
        }

        .playlist-indicator {
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 15px;
            background: rgba(15, 20, 40, 0.6);
        }

        .playlist-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: rgba(100, 130, 200, 0.5);
            cursor: pointer;
            transition: all 0.3s;
        }

        .playlist-dot.active {
            background: #ffcc00;
            transform: scale(1.2);
            box-shadow: 0 0 10px rgba(255, 204, 0, 0.7);
        }

        /* Commentary Section */
        .commentary-section {
            flex: 1;
            background: rgba(30, 35, 60, 0.8);
            border-radius: 15px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(100, 150, 255, 0.2);
        }

        .commentary-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #ffcc00;
            text-align: center;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 204, 0, 0.3);
        }

        .commentary-content {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .commentary-slides {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: transform 0.5s ease-in-out;
        }

        .commentary-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            padding-right: 10px;
        }

        .artist-section {
            margin-bottom: 25px;
        }

        .artist-name {
            font-size: 1.3rem;
            color: #6ab7ff;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid rgba(106, 183, 255, 0.3);
        }

        .artist-context {
            font-size: 0.9rem;
            color: #aac8e5;
            margin-bottom: 15px;
            line-height: 1.5;
            font-style: italic;
        }

        .track-info {
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(20, 25, 45, 0.5);
            border-radius: 8px;
            border-left: 3px solid rgba(106, 183, 255, 0.5);
        }

        .track-title {
            font-size: 1.2rem;
            color: #a3d5ff;
            margin-bottom: 5px;
        }

        .track-artist {
            font-size: 1rem;
            color: #b3e5fc;
            margin-bottom: 10px;
        }

        .commentary-text {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #e0e0e0;
        }

        .commentary-text p {
            margin-bottom: 10px;
        }

 

        /* Responsive adjustments */
        @media (max-width: 767px) {
            .control-button {
                width: 50px;
                height: 50px;
                font-size: 1.2rem;
            }
            
            .container {
                height: auto;
                max-height: none;
            }
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    
    <div class="container">
        <div class="content">
            <!-- Video Section -->
            <div class="video-section">
                <div class="video-container">
                    <iframe class="youtube-embed" id="youtube-player" src="https://www.youtube.com/embed/iX8pYFlzP9U?enablejsapi=1" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>
                
                <div class="video-controls">
                    <button class="control-button prev-button">
                        <i class="fas fa-backward-step"></i>
                    </button>
                    <button class="control-button play-button">
                        <i class="fas fa-play"></i>
                    </button>
                    <button class="control-button next-button">
                        <i class="fas fa-forward-step"></i>
                    </button>
                </div>
                
                <div class="playlist-indicator" id="playlist-indicator">
                    <!-- Dots will be generated by JavaScript -->
                </div>
            </div>
            
            <!-- Commentary Section -->
            <div class="commentary-section">
                <h2 class="commentary-title">TRACK COMMENTARY</h2>
                
                <div class="commentary-content">
                    <div class="commentary-slides" id="commentary-slides">
                        <!-- Commentary slides will be generated by JavaScript -->
                    </div>
                </div>
            </div>
        </div>
        
      

    <script>
        // Playlist data
        const playlist = [
            {
                title: "In My Room",
                artist: "Julia Wolf",
                youtubeId: "AhaISeg6zpE",
                artistName: "Julia Wolf",
                artistContext: "Julia Wolf is an American singer, songwriter, and record producer. Multitalented and remarkably accurate in recreating the 2000's grundge pop-rock sound.",
                commentary: "This being the song that popularized Julia Wolf, is also the song that introduced me to her music. Everything from her Twilight-esque aesthetics to her grundgey alt-rock sound screams cool older sister. Fun fact though, shes such a fan of the Twilight franchise that this music video is shot in Forks, Washington at locations where the Twilight movie was filmed."
            },
            {
                title: "Sternum",
                artist: "Lia Juno",
                youtubeId: "_dQzzGQm2oE",
                artistName: "Lia Juno",
                artistContext: "As she describes herself, she is la-based, tangible, and floating. While I don't know about floating, the feelings and experiences she portrays are definitely tangible. From doomed yearning to the frustration of self, her music is the audible embodiment of struggling through teenage girlhood to womanhood. ",
                commentary: "Favorite and most popular song from her for a reason. When I first heard this it went triple platinum in my room. Not only that, this song is also so visceral. This song IS the desperate need for someone to love you back and understand you. While not being a deliberately queer song, I'm sure that theme would apply."
            },
            {
                title: "Swang",
                artist: "Rae Sremmurd",
                youtubeId: "dmJefsOErr0",
                artistName: "Rae Sremmurd",
                artistContext: "Swae Lee & Slim Jxmmi are the brothers that make up the music duo Rae Sremmurd. They're behind the trap anthems Black Beatles, No Type, and as you're listening to, Swang. They ran 2016 trap and hip hop, and currently run my Spotify.",
                commentary: "Being from their second studio album SremmLife 2, this release threw them even further into popularity. This song never fails to motivate me and make me feel like a baller. Every lyric I know by heart, and the only parts I won't sing with my soul are the parts I shouln't and the line \"But I dropped out and chose to be a baller\". I will pursue my education, while still balling thank you!"
            },
            {
                title: "Just For me (Midwest Emo Ver.)",
                artist: "Kiss the Scientist",
                youtubeId: "hR_c-YlEcpM",
                artistName: "Kiss the Scientist",
                artistContext: "For a band still young in it's career having only debuted in 2025 they're doing pretty well. When they started to gain traction with the EP Better In My Head they were only launched forward with their cover of Just for Me.",
                commentary: "IMO I don't listen to a lot of their music, but this cover is a banger. Originally being a parody cover turning PinkPantheress' pop song into midwest emo, it just got so popular they had to release it. This could only happen in the 21st century."
            },
            {
                title: "Hasta Cuando",
                artist: "Kali Uchis",
                youtubeId: "vmcrxMtp7q0",
                artistName: "Kali Uchis",
                artistContext: "KALI UCHIS. SHE IS MOTHER; SHE IS LIFE. Mami Uchis blew up in 2020 with telepatia, but was already relevant with significant tracks and features like on See You Again with Tyler, the Creator. We have Mami Uchis to thank for playing a big part in popularizing latin & spanish music.",
                commentary: "Hate me cause they ain't me is basically what this song praises. While it depicts the story of an ex lying on your name because they're jealous, you don't need an evil ex to sing this song with your heart. If you have any haters, this anthem applies."
            },
            {
                title: "I Wish you Roses",
                artist: "Kali Uchis",
                youtubeId: "-Y7zc0eO26k",
                artistName: "Kali Uchis",
                artistContext: "KALI UCHIS. SHE IS MOTHER; SHE IS LIFE. Mami Uchis blew up in 2020 with telepatia, but was already relevant with significant tracks and features like on See You Again with Tyler, the Creator. We have Mami Uchis to thank for playing a big part in popularizing latin & spanish music.",
                commentary: "In choosing peace she wishes all those she used to love roses. After listening to Hasta Cuando this song is definitely needed before my head grows too big."
            },
            {
                title: "Yahhh!",
                artist: "Soulja Boy",
                youtubeId: "Om4eqmF1hlM",
                artistName: "Soulja Boy",
                artistContext: "Pioneering internet marketing, he released his own music & videos all over MySpace and Youtube. With Crank That blowing up and throwing him to stardom that's how we got to supaman.",
                commentary: "This song is very situational for me. The second someone is playing in my face this song is queued, specifically for the part where he repeats \"GET OUT MY FACE\" because y'all have to get out my face."
            },
            {
                title: "Report Card",
                artist: "Soulja Boy",
                youtubeId: "g7bX0-W1d3g",
                artistName: "Soulja Boy",
                artistContext: "Pioneering internet marketing, he released his own music & videos all over MySpace and Youtube. With Crank That blowing up and throwing him to stardom that's how we got to supaman.",
                commentary: "Being equally situational as Yahhh!, this song is on when I flop on a test. Soulja Boy helps me cope, what can I say."
            },
            {
                title: "Headliner",
                artist: "Pretty Sick",
                youtubeId: "unUspj0lDn8",
                artistName: "Pretty Sick",
                artistContext: "With their grundgey dreamy sound their music sounds like a dream (or nightmare) you can't quite remember. By mixing grundge & electronic music they've been building a cult following since 2014.",
                commentary: "This song explores the oncoming confusion of attraction, identity, and self worth that comes with youth. The visuals of being an angel stuck on the grundiest city on Earth (NYC) is a great omage to the ethereal yet liminal sound of the track"
            },
            {
                title: "Silk Lingerie",
                artist: "Kali Uchis",
                youtubeId: "wbjpbrfA2HI",
                artistName: "Kali Uchis",
                artistContext: "KALI UCHIS. SHE IS MOTHER; SHE IS LIFE. Mami Uchis blew up in 2020 with telepatia, but was already relevant with significant tracks and features like on See You Again with Tyler, the Creator. We have Mami Uchis to thank for playing a big part in popularizing latin & spanish music)",
                commentary: "Seeing this and the previous Kali Uchis songs on this playlist live healed something in me. Silk Lingerie really is just the feeling of being so intensely in love with someone to where you don't understand how someone can be so perfect. This song also depicts perfectly her ethereal vocals; Mami Uchis is a real life siren. If you listen to the full album you'll also find that the transition into the next song Territorial is insanely smooth."
            },
            {
                title: "Get Away",
                artist: "The Internet",
                youtubeId: "z32HJ7PHnKY",
                artistName: "The Internet",
                artistContext: "A 2-person band made up of Tyler Joseph (singer + much more) and Josh Dun (drummer)",
                commentary: "Please do not feel pressured to watch this entire video 🤣. I included this video because it closes a decade-long concept project that spans several albums. Between that first video and this one, tøp released 5 albums and a ton of corresponding media (a secret website, letters, music videos. etc.) that build out a story about a character Clancy trying to escape from a city called Dema, mirroring the struggles people can experience with mental health and trying to escape those patterns. A lot of the tøp fanbase was drawn to the band due to their lyrics / imagery / etc. directly addressing mental health struggles. The video contains callbacks to several lore-related videos from those earlier albums, and the audio ends with the beginning audio of the song heavydirtysoul, which essentially makes a full circle with the plot."
            },
            {
                title: "Girl",
                artist: "The Internet",
                youtubeId: "zmY8mG4_3j4",
                artistName: "The Internet",
                artistContext: "A 2-person band made up of Tyler Joseph (singer + much more) and Josh Dun (drummer)",
                commentary: "Oldies Station is one of my favorite tøp songs and I think this acoustic rendition is beautiful. You'll see Tyler prefaces the song by saying a main purpose of it it was to give the fans an update on how he was — as I mentioned before a lot of the fanbase is very connected to the theme of mental health that runs through the band's music & they are well-versed in what Tyler has shared of his own experiences in the songs etc. Thus why his fans would be invested in that so much as to produce a song."
            },
            {
                title: "damned",
                artist: "Miguel",
                youtubeId: "yXd4YeSLRQM",
                artistName: "Miguel",
                artistContext: "A 2-person band made up of Tyler Joseph (singer + much more) and Josh Dun (drummer)",
                commentary: "This is a really special song off the new album – when I attended Seasick's album release listening party, Tyler prefaced that this song was actually 14 years old and Josh (the drummer) had kept a demo of it on his computer after all those years and brought it up as an idea for this album. Stylistically, it sounds similar to their early stuff. Very special context for this (very recent!!) video — this is the first (and only so far) time they played it live. It is not on their tour setlist. This video was filmed at a private no-phones show hosted by a radio station while they were in LA last week to play some stadiums. You can tell how shocked and excited the fans were when they realized what song was starting. I think the video also really encapsulates the connection between the band and their fans, and the band's dynamic audience engagement."
            },
            {
                title: "Sycamore Tree",
                artist: "Kali Uchis",
                youtubeId: "q7oGK90Y0pQ",
                artistName: "Kali Uchis",
                artistContext: "",
                commentary: "A great encapsulation of her bubblegum pop aesthetic and energy mixed with Midwest Princess roots. If you didn't know, she's from the small town of Springfield, MO, where this music video is set."
            },
            {
                title: "Tommy",
                artist: "Fcukers",
                youtubeId: "EZw0-BBKZ1A",
                artistName: "Fcukers",
                artistContext: "",
                commentary: "My fav! So fun so cute. Independently released in 2022 as she got dropped from her label in 2020 and before she signed with her producer Dan Nigro's Amusement Records in early 2023 — Dan Nigro also produces for Olivia Rodrigo. After she was dropped, she moved back to MO to save up $ and give it one last shot in LA (clearly that worked out). Her catapult to fame occurred in spring/summer 2024 after the momentum she built with the independent releases, opening for Olivia Rodrigo's world tour, appearing on NPR Tony Desk, promoting and releasing her single Good Luck, Babe!, and playing Coachella right after that. Fun fact — I saw her at Iron City (~1500 cap) in March of 2024 and it felt like a tidal wave before it took off. I then saw her 5 months later in a crowd of 100K people at lollapalooza in Chicago. Wild."
            },
            {
                title: "New Choppa ft. A$AP Rocky",
                artist: "Playboi Carti",
                youtubeId: "_JZqoGz0b6o",
                artistName: "Playboi Carti",
                artistContext: "",
                commentary: "Gorgeous song, about her best friend that she was in love with who didn't share those feelings. If you like the slower sound, listen to California, which is basically about her journey struggling to make it as an artist and moving from Missouri to LA to do so."
            },
            {
                title: "Tight Dress",
                artist: "Kaila",
                youtubeId: "EV8nBMQHKzE",
                artistName: "Kaila",
                artistContext: "",
                commentary: "Gorgeous song about how beautiful the world is (and whatever man she's also singing about (?))."
            },
            {
                title: "BEAT UP CHANEL$",
                artist: "slayyyter",
                youtubeId: "hhvW8qB-W3M",
                artistName: "slayyyter",
                artistContext: "",
                commentary: "Ms. Musgraves likes to meditate on life and I must say I quite enjoy that."
            },
            {
                title: "WASSUP",
                artist: "Young Miko",
                youtubeId: "LEhTlLnOVDU",
                artistName: "Young Miko",
                artistContext: "Up-and-coming indie rock singer; slowly cementing her spot on my list of favorite lyricists! I find her sound unique as a female rock vocalist.",
                commentary: "A good representation of her overall sound and ability to write about life & relationships (in this case, her relationship with her mother)."
            },
            {
                title: "BIAF",
                artist: "Young Miko",
                youtubeId: "BboJ9CzPhnM",
                artistName: "Young Miko",
                artistContext: "",
                commentary: "\"grandma cried when I pierced my nose\" one of my fav song lyrics ever 🤣makes me giggle every time"
            }
        ];

        document.addEventListener('DOMContentLoaded', function() {
            const prevButton = document.querySelector('.prev-button');
            const nextButton = document.querySelector('.next-button');
            const playButton = document.querySelector('.play-button');
            const playlistIndicator = document.getElementById('playlist-indicator');
            const commentarySlides = document.getElementById('commentary-slides');
            const youtubePlayer = document.getElementById('youtube-player');
            
            let currentTrack = 0;
            let isPlaying = false;
            
            // Create playlist dots
            playlist.forEach((track, index) => {
                const dot = document.createElement('div');
                dot.className = 'playlist-dot';
                if (index === 0) dot.classList.add('active');
                dot.setAttribute('data-index', index);
                playlistIndicator.appendChild(dot);
            });
            
            const dots = document.querySelectorAll('.playlist-dot');
            
            // Create commentary slides
            playlist.forEach((track, index) => {
                const slide = document.createElement('div');
                slide.className = 'commentary-slide';
                slide.style.transform = `translateX(${index * 100}%)`;
                
                // Create artist section for this track
                const artistSection = document.createElement('div');
                artistSection.className = 'artist-section';
                
                const artistName = document.createElement('h3');
                artistName.className = 'artist-name';
                artistName.textContent = track.artistName;
                artistSection.appendChild(artistName);
                
                if (track.artistContext) {
                    const artistContext = document.createElement('p');
                    artistContext.className = 'artist-context';
                    artistContext.textContent = track.artistContext;
                    artistSection.appendChild(artistContext);
                }
                
                // Create track info
                const trackInfo = document.createElement('div');
                trackInfo.className = 'track-info';
                
                const trackTitle = document.createElement('h4');
                trackTitle.className = 'track-title';
                trackTitle.textContent = track.title;
                trackInfo.appendChild(trackTitle);
                
                const trackArtist = document.createElement('p');
                trackArtist.className = 'track-artist';
                trackArtist.textContent = track.artist;
                trackInfo.appendChild(trackArtist);
                
                const commentaryText = document.createElement('div');
                commentaryText.className = 'commentary-text';
                
                // Split commentary by paragraphs if needed
                const paragraphs = track.commentary.split('\n');
                paragraphs.forEach(paragraph => {
                    if (paragraph.trim()) {
                        const p = document.createElement('p');
                        p.textContent = paragraph.trim();
                        commentaryText.appendChild(p);
                    }
                });
                
                trackInfo.appendChild(commentaryText);
                artistSection.appendChild(trackInfo);
                slide.appendChild(artistSection);
                commentarySlides.appendChild(slide);
            });
            
            // Navigation functions
            function goToTrack(index) {
                // Update active dot
                dots.forEach(dot => dot.classList.remove('active'));
                dots[index].classList.add('active');
                
                // Update YouTube video
                currentTrack = index;
                youtubePlayer.src = `https://www.youtube.com/embed/${playlist[index].youtubeId}?enablejsapi=1&autoplay=0`;
                
                // Update commentary slide position
                commentarySlides.style.transform = `translateX(-${index * 100}%)`;
                
                // Reset play button
                playButton.innerHTML = '<i class="fas fa-play"></i>';
                isPlaying = false;
            }
            
            // Event listeners
            prevButton.addEventListener('click', function() {
                let newIndex = currentTrack - 1;
                if (newIndex < 0) newIndex = playlist.length - 1;
                goToTrack(newIndex);
            });
            
            nextButton.addEventListener('click', function() {
                let newIndex = currentTrack + 1;
                if (newIndex >= playlist.length) newIndex = 0;
                goToTrack(newIndex);
            });
            
            playButton.addEventListener('click', function() {
                // Toggle play/pause
                if (!isPlaying) {
                    playButton.innerHTML = '<i class="fas fa-pause"></i>';
                    isPlaying = true;
                    // For now, we'll just reload the video with autoplay
                    youtubePlayer.src = `https://www.youtube.com/embed/${playlist[currentTrack].youtubeId}?enablejsapi=1&autoplay=1`;
                } else {
                    playButton.innerHTML = '<i class="fas fa-play"></i>';
                    isPlaying = false;
                    // For now, we'll just reload the video without autoplay
                    youtubePlayer.src = `https://www.youtube.com/embed/${playlist[currentTrack].youtubeId}?enablejsapi=1&autoplay=0`;
                }
            });
            
            // Dot navigation
            dots.forEach((dot) => {
                dot.addEventListener('click', function() {
                    const index = parseInt(this.getAttribute('data-index'));
                    goToTrack(index);
                });
            });
            
            // Initialize with first track
            goToTrack(0);
        });
    </script>
</body>
</html>
